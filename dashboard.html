<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verdictium Dashboard</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

/* 🌙 DEFAULT DARK */
body {
  background: linear-gradient(135deg,#000,#111);
  color: white;
  transition: 0.4s;
}

/* 🟢 DARK GREEN */
body.green {
  background: linear-gradient(135deg,#001a14,#003d2e);
  color: #d2ffe9;
}

/* 🌿 GREY-GREEN */
body.greygreen {
  background: linear-gradient(135deg,#2f3e3e,#354f52);
  color: #e0f2f1;
}

/* 🧡 CORAL */
body.coral {
  background: linear-gradient(135deg,#ff7f50,#ff9966);
  color: #1a1a1a;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  position: relative;
  z-index: 10;
}

/* LEFT */
.left {
  display:flex;
  align-items:center;
  gap:10px;
}

.menu {
  font-size:26px;
  cursor:pointer;
}

/* LOGO */
.logo img {
  height:26px;
  width:26px;
  border-radius:50%;
  object-fit:cover;
}

/* TITLE */
.title {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  font-weight:bold;
}

/* RIGHT */
.controls {
  display:flex;
  gap:10px;
}

select, button {
  padding:6px;
  border-radius:6px;
  border:none;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  transition:0.4s;
  padding:20px;
  z-index:9999;
}

.sidebar.active {
  left:0;
}

/* CLOSE BTN */
.close-btn {
  font-size:24px;
  cursor:pointer;
  text-align:right;
  margin-bottom:20px;
}

.sidebar a {
  display:block;
  margin:10px 0;
  color:white;
  text-decoration:none;
}

/* MAIN */
.main {
  text-align:center;
  padding:40px;
}

/* UPLOAD BOX */
.upload-box {
  margin:40px auto;
  width:420px;
  height:260px;
  border-radius:20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
}

.upload-box:hover {
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(255,140,0,0.4);
}

.formats {
  margin-top:10px;
  font-size:14px;
  opacity:0.7;
}

/* FEATURE BOX */
.feature-box {
  margin-top:20px;
  padding:15px;
  border-radius:15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  display:none;
}

/* BUTTON */
.confirm-btn {
  padding:10px 20px;
  background: orange;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* ABOUT + TERMS */
.about {
  margin-top:50px;
}

.about button {
  padding:12px 28px;
  margin:10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.about button:hover {
  background: rgba(255,140,0,0.15);
  border-color: orange;
  box-shadow: 0 0 15px rgba(255,140,0,0.6);
  transform: scale(1.05);
}

/* 🌈 TEXT FIX FOR LIGHT THEMES */
body.coral .about button,
body.greygreen .about button {
  color:#111;
  border:1px solid rgba(0,0,0,0.2);
}

/* FOOTER */
footer {
  margin-top:50px;
  padding:20px;
  text-align:center;
  background:#000;
}

/* BACKGROUND EFFECT */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 20% 30%, rgba(255,140,0,0.15), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08), transparent 40%);
  z-index:-1;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="close-btn" onclick="toggleMenu()">✖</div>

  <a>Risk Score</a>
  <a>Clause Detection</a>
  <a>Future Simulator</a>
  <a>Loophole Finder</a>
  <a>Summarization</a>
  <a>IPC Sections</a>
  <a>Consult Lawyer</a>
  <a>User Input & Clarification</a>
</div>

<!-- HEADER -->
<div class="header">

  <div class="left">
    <span class="menu" onclick="toggleMenu()">☰</span>
    <div class="logo">
      <img src="LAW.png">
    </div>
  </div>

  <div class="title">Verdictium</div>

  <div class="controls">
    <select id="lang" onchange="changeLang()">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="kn">Kannada</option>
      <option value="ta">Tamil</option>
    </select>

    <!-- 🎨 THEME BUTTON -->
    <button onclick="toggleTheme()">🎨</button>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="upload-box" onclick="showFeatureBox()">
    <p id="uploadText">Upload Document</p>
    <div class="formats">(PDF / PNG / JPG supported)</div>
  </div>

  <div class="feature-box" id="featureBox">
    <h3>Select Feature</h3>

    <select>
      <option>Summarization</option>
      <option>Risk Score</option>
      <option>Clause Detection</option>
      <option>Future Simulator</option>
      <option>Loophole Finder</option>
    </select>

    <br>
    <button class="confirm-btn" onclick="goNext()">Confirm</button>
  </div>

  <div class="about">
    <button onclick="goAbout()">About Us</button>
    <button onclick="goTerms()">Terms & Conditions</button>
  </div>

</div>

<footer>
  © 2026 Verdictium | Links | Gallery | Socials
</footer>

<script>

let mode = 0;
/* 0 = dark, 1 = green, 2 = greygreen, 3 = coral */

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function showFeatureBox(){
  document.getElementById("featureBox").style.display="block";
}

/* 🎨 THEME SWITCH */
function toggleTheme(){
  mode++;
  if(mode > 3) mode = 0;

  document.body.classList.remove("green","greygreen","coral");

  if(mode === 1){
    document.body.classList.add("green");
  }
  else if(mode === 2){
    document.body.classList.add("greygreen");
  }
  else if(mode === 3){
    document.body.classList.add("coral");
  }
}

function changeLang(){
  let lang = document.getElementById("lang").value;
  let text = document.getElementById("uploadText");

  if(lang==="hi") text.innerText="दस्तावेज़ अपलोड करें";
  else if(lang==="kn") text.innerText="ದಾಖಲೆ ಅಪ್‌ಲೋಡ್ ಮಾಡಿ";
  else if(lang==="ta") text.innerText="ஆவணத்தை பதிவேற்றவும்";
  else text.innerText="Upload Document";
}

function goNext(){
  window.location.href="result.html";
}

function goAbout(){
  window.location.href="about.html";
}

function goTerms(){
  window.location.href="terms.html";
}

</script>

</body>
</html>
